<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#05070D"/>
  <radialGradient id="glow" cx="50%" cy="38%" r="45%">
    <stop offset="0%" stop-color="#2D6CDF" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#05070D" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Gold diamond frame -->
  <g transform="translate(600, 240) rotate(45)">
    <rect x="-72" y="-72" width="144" height="144" rx="6" stroke="#C9A84C" stroke-width="3" fill="none"/>
    <rect x="-60" y="-60" width="120" height="120" rx="4" stroke="rgba(201,168,76,0.4)" stroke-width="1" fill="none"/>
  </g>

  <!-- Eye icon inside diamond -->
  <path d="M556 240C576 210 600 200 600 200s24 10 44 40c-20 30-44 40-44 40s-24-10-44-40Z" stroke="rgba(180,210,255,0.8)" stroke-width="2" fill="none"/>
  <circle cx="600" cy="240" r="16" stroke="rgba(180,210,255,0.9)" stroke-width="1.8" fill="none"/>

  <!-- Eye glow -->
  <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#4DA3FF" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#2D6CDF" stop-opacity="0.3"/>
  </radialGradient>
  <circle cx="600" cy="240" r="6" fill="url(#eyeGlow)"/>
  <circle cx="600" cy="237" r="2" fill="rgba(255,255,255,0.8)"/>

  <!-- Title -->
  <text x="600" y="400" font-family="Georgia, serif" font-size="72" font-weight="300" font-style="italic" fill="#F4F8FF" text-anchor="middle" letter-spacing="4">Lovtaro</text>

  <!-- Decorative line -->
  <line x1="480" y1="440" x2="720" y2="440" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
</svg>
